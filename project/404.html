<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страницата не постои — Зборци</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #3B1F3A 0%, #1A7A6E 100%);
      font-family: 'Nunito', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.97);
      border-radius: 18px;
      padding: 48px 36px 40px;
      max-width: 400px; width: 100%;
      text-align: center;
      box-shadow: 6px 6px 0 rgba(0,0,0,.18);
    }
    .logo {
      font-family: 'Oswald', sans-serif;
      font-size: 2.4rem; font-weight: 700;
      color: #3B1F3A;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }
    .logo span { color: #E85A1A; }
    .err-code {
      font-family: 'Oswald', sans-serif;
      font-size: 5rem; font-weight: 700;
      color: #E85A1A;
      line-height: 1;
      margin: 20px 0 8px;
    }
    h2 {
      font-size: 1.3rem; font-weight: 800;
      color: #3B1F3A;
      margin-bottom: 12px;
    }
    p {
      font-size: .95rem; color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    a {
      display: inline-block;
      background: #E85A1A;
      color: #fff;
      font-family: 'Oswald', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 12px 32px;
      border-radius: 8px;
      box-shadow: 3px 3px 0 #B03A00;
      transition: transform .12s, box-shadow .12s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 4px 5px 0 #B03A00; }
    a:active { transform: translateY(1px); box-shadow: 2px 2px 0 #B03A00; }
    @media (max-width: 480px) {
      .card { padding: 36px 24px 32px; }
      .err-code { font-size: 4rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ЗБО<span>Р</span>ЦИ</div>
    <div class="err-code">404</div>
    <h2>Страницата не постои</h2>
    <p>Зборот не може да се најде! Провери ја адресата или се врати на почетната страница.</p>
    <a href="/">🎮 Кон игрите →</a>
  </div>
</body>
</html>
